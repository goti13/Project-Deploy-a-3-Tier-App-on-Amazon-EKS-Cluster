name: Build and Deploy Voting App

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push vote image
      uses: docker/build-push-action@v5
      with:
        context: ./vote
        push: true
        tags: otigerald/voting-app:${{ github.sha }}

    - name: Build and push result image
      uses: docker/build-push-action@v5
      with:
        context: ./result
        push: true
        tags: otigerald/result-app:${{ github.sha }}

    - name: Build and push worker image
      uses: docker/build-push-action@v5
      with:
        context: ./worker
        push: true
        tags: otigerald/worker-app:${{ github.sha }}

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --name spot-eks-lab-gerald1 \
          --region us-east-1

    - name: Update image tags in manifests
      run: |
        sed -i "s|otigerald/voting-app:.*|otigerald/voting-app:${{ github.sha }}|g" k8s/vote-deployment.yaml
        sed -i "s|otigerald/result-app:.*|otigerald/result-app:${{ github.sha }}|g" k8s/result-deployment.yaml
        sed -i "s|otigerald/worker-app:.*|otigerald/worker-app:${{ github.sha }}|g" k8s/worker-deployment.yaml

    - name: Deploy to EKS
      run: kubectl apply -f k8s/

    - name: Verify rollout
      run: |
        kubectl rollout status deployment/vote --timeout=120s
        kubectl rollout status deployment/result --timeout=120s
        kubectl rollout status deployment/worker --timeout=120s